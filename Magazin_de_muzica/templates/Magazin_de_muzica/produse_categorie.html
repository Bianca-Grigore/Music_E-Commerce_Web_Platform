<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>Categorie Produse</title>
    <style>
        /* Fundal și font general */
        body { 
            background-color: #121212; 
            color: #e0e0e0; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px;
            line-height: 1.6;
        }

        /* Titlul principal */
        h1 { 
            color: rgb(148, 62, 245); 
            text-align: center; 
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        hr { 
            border: 0; 
            height: 1px; 
            background: linear-gradient(to right, transparent, rgb(148, 62, 245), transparent); 
            margin-bottom: 40px;
        }

        /* Grid-ul de produse */
        .lista-produse { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 25px; 
            padding: 20px 0; 
        }

        /* Cardul de produs */
        .produs-card { 
            background-color: #1e1e1e; 
            border: 1px solid #333; 
            border-radius: 12px;
            padding: 25px; 
            text-align: center; 
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .produs-card:hover { 
            transform: translateY(-10px); 
            border-color: rgb(148, 62, 245); 
            box-shadow: 0 10px 20px rgba(148, 62, 245, 0.2);
        }

        .produs-card h3 {
            margin-top: 0;
            color: #fff;
            font-size: 1.3rem;
        }

        /* Prețul */
        .pret { 
            color: #2ecc71; /* Un verde mai vibrant pentru dark mode */
            font-weight: bold; 
            font-size: 1.4rem;
            margin: 15px 0;
        }

        /* Link-uri / Butoane */
        a { 
            color: rgb(148, 62, 245); 
            text-decoration: none; 
            font-weight: bold;
            transition: color 0.3s;
        }

        .produs-card a {
            display: inline-block;
            padding: 8px 20px;
            border: 2px solid rgb(148, 62, 245);
            border-radius: 20px;
            margin-top: 10px;
        }

        .produs-card a:hover {
            background-color: rgb(148, 62, 245);
            color: #fff;
        }

        /* Link-ul de întoarcere */
        body > a {
            display: block;
            text-align: center;
            margin-top: 40px;
            opacity: 0.7;
        }

        body > a:hover {
            opacity: 1;
            text-decoration: underline;
        }

        /* Mesaj pentru categorie goală */
        p { text-align: center; font-style: italic; color: #888; }
    </style>
</head>
<body>

    <h1>Categoria: {{ categorie.nume }}</h1>
    <hr>

    <div class="lista-produse">
        {% for produs in produse %}
            <div class="produs-card">
                <h3>{{ produs.denumire }}</h3>
                
                <p class="pret">Preț: {{ produs.pret }} RON</p>
                
                <a href="{{ produs.get_absolute_url }}">Vezi detalii</a>
            </div>
        {% empty %}
            <p>Nu am găsit produse în această categorie.</p>
        {% endfor %}
    </div>

    <br>
    <a href="{% url 'lista_produse' %}">Înapoi la pagina de produse</a>

</body>
</html>
